name: publish.yml
on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: setup uv
        uses: astral-sh/setup-uv@v8
        with:
          activate-environment: true
      - run: uv sync
      - name: Build
        run: uv build
      - name: share to artifacts
        uses: actions/upload-artifact@v7
        with:
          path: dist
          name: 'artifact'
      - name: upload to github registry
        run: uv publish --direcrory dist/ \
          --publish-url https://pypi.pkg.github.com \
          --username ${{ github.repository_owner }} \
          --password ${{ secrets.GITHUB_TOKEN }}
      - name: upload to pypi
        run: uv publish \
          --username __token__ \
          --password ${{ secrets.PYPI_API_TOKEN }}
  publish-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ./
          name: 'artifact'
      - name: release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./*.whl
            ./*.tar.gz